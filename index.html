<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PWA Motorola</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="app">
        <div id="loadingOverlay">
            <div class="spinner"></div>
        </div>

        <!-- Sync Status Indicator -->
        <div id="syncStatus" class="sync-indicator hidden">
            <div class="spinner-tiny"></div>
            <span>Sincronizando...</span>
        </div>

        <!-- PANTALLA DE VINCULACIÓN -->
        <div id="pairingOverlay" class="hidden">
            <div class="pairing-card">
                <img src="https://gtf-sap-repo.s3.us-east-1.amazonaws.com/images/l1nx/logo2-L1NX-azulnaranja%2B(2).png"
                    alt="LINX Logo" class="brand-logo">
                <h1>Vincular Dispositivo</h1>
                <p>Ingresa este código en tu panel de control para enlazar esta pantalla.</p>
                <div class="code-display" id="pairingCodeDisplay">------</div>
                <div class="waiting-indicator">
                    <div class="spinner-small"></div>
                    <p>Esperando autorización...</p>
                </div>
            </div>
        </div>

        <video id="idleVideo" muted loop playsinline preload="auto" class="hidden">
            <source src="/video.mp4" type="video/mp4">
            Tu navegador no soporta el elemento de video.
        </video>
        <img id="displayImage" class="hidden" alt="Contenido">
        <div id="interactionOverlay"></div>
        <iframe id="contentFrame" src="about:blank" allow="autoplay; fullscreen" frameborder="0"></iframe>
    </div>
    <script type="module" src="/main.js"></script>
</body>

</html>
