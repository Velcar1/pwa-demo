<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PWA Motorola</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="app">
        <div id="loadingOverlay">
            <div class="spinner"></div>
        </div>
        <video id="idleVideo" muted loop playsinline preload="auto" class="hidden">
            <source src="/video.mp4" type="video/mp4">
            Tu navegador no soporta el elemento de video.
        </video>
        <div id="interactionOverlay"></div>
        <iframe id="contentFrame" src="about:blank" allow="autoplay; fullscreen" frameborder="0"></iframe>
    </div>
    <script type="module" src="/main.js"></script>
</body>

</html>
